; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; 双环境：在 PlatformIO 底部状态栏选择 env，或执行：
;   pio run -e nano        # Arduino Nano
;   pio run -e rp2040zero  # RP2040-zero + OLED

[platformio]
default_envs = rp2040zero, nano

[env:nano]
platform = atmelavr
board = nanoatmega328new
framework = arduino
build_src_filter = +<main.cpp>

[env:rp2040zero]
platform = raspberrypi
board = pico
framework = arduino
lib_deps = olikraus/U8g2 @ ^2.34.22
build_src_filter = +<pico_zero.cpp>
